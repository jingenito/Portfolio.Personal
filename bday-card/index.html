<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disegno No. 1</title>
    <style>
        /* Base setup matching your dark card aesthetic */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19; /* Deep slate/navy background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* The swipe wrapper */
        .carousel-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: scroll;
            scroll-snap-type: x mandatory; /* Forces native mobile snapping */
            scroll-behavior: smooth;
            /* Hide standard scrollbars for a clean app-like look */
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; 
        }

        .carousel-container::-webkit-scrollbar {
            display: none; 
        }

        /* Each individual slide */
        .slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: center; /* Snaps the image dead-center */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Responsive image constraints */
        img {
            max-width: 95%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Subtle, elegant indicator text */
        .hint {
            color: #475569; /* Muted slate gray */
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="carousel-container">
        
        <div class="slide">
            <img src="michelangelo-david-statue.gif" alt="Trajectory of David">
            <div class="hint">Swipe for trajectory no. 2 &rarr;</div>
        </div>

        <div class="slide">
            <img src="creation-of-adam.gif" alt="Trajectory of Adam">
            <div class="hint">&larr; Swipe back</div>
        </div>

    </div>

</body>
</html>
